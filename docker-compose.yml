services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - ./samples:/app/samples
    environment:
      - FACTORY_DATA_DIR=/app/data
      - FACTORY_SAMPLE_DIR=/app/samples

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

